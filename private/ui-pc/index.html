<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dreamOS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --void:#0a0c13;
    --glass:rgba(18,22,36,.6);
    --glass-strong:rgba(14,17,28,.86);
    --hairline:rgba(143,168,200,.16);
    --ink:#cdd6ec;
    --ink-dim:#6c7892;
    --accent:#8fa8c8;
    --glow:#a98ce6;
    --radius:16px;
    --ease:cubic-bezier(.16,.8,.24,1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:var(--void);
    color:var(--ink);
    font-family:'Space Grotesk',Arial,sans-serif;
}

@media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
}


/* ---------- desktop ---------- */

.pc-main{
    position:fixed;
    inset:0;
}

.wallpaper{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:saturate(.85) brightness(.8);
}

.vignette{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:radial-gradient(ellipse at 50% 40%, transparent 35%, rgba(4,5,10,.6) 100%);
}

.desktop-icons{
    position:absolute;
    top:36px;
    left:30px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:5;
}

.desktop-app{
    width:84px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:9px;
    cursor:pointer;
    padding:12px 8px;
    border-radius:14px;
    opacity:0;
    transition:background .2s var(--ease), transform .15s var(--ease);
}

.desktop-app:hover{
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(6px);
    transform:translateY(-2px);
}

.desktop-app:active{
    transform:translateY(0) scale(.96);
}

.desktop-app img{
    width:50px;
    height:50px;
    object-fit:cover;
    border-radius:11px;
    box-shadow:0 4px 14px rgba(0,0,0,.45);
}

.desktop-app span{
    color:var(--ink);
    text-shadow:0 1px 6px rgba(0,0,0,.8);
    font-size:.72rem;
    letter-spacing:.04em;
}


/* ---------- taskbar ---------- */

.taskbar{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:46px;

    background:rgba(8,10,17,.55);
    backdrop-filter:blur(18px);
    border-top:1px solid var(--hairline);

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 18px;
    z-index:40;
}

.taskbar-left{
    font-size:.78rem;
    letter-spacing:.06em;
    color:var(--ink-dim);
}

.taskbar-left b{
    color:var(--ink);
    font-weight:500;
}

.taskbar-right{
    font-family:'JetBrains Mono',monospace;
    font-size:.8rem;
    color:var(--ink-dim);
    font-variant-numeric:tabular-nums;
}


/* ---------- windows (shared chrome) ---------- */

.window{
    position:fixed;
    display:none;
    flex-direction:column;
    background:var(--glass-strong);
    border:1px solid var(--hairline);
    border-radius:var(--radius);
    box-shadow:0 24px 60px rgba(0,0,0,.55);
    backdrop-filter:blur(22px);
    overflow:hidden;
    z-index:50;
}

.window-titlebar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 14px;
    border-bottom:1px solid var(--hairline);
    cursor:grab;
    user-select:none;
    flex-shrink:0;
}

.window-titlebar:active{ cursor:grabbing; }

.window-dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--glow);
    box-shadow:0 0 6px var(--glow);
    animation:breathe 4.5s ease-in-out infinite;
    flex-shrink:0;
}

@keyframes breathe{
    0%,100%{ opacity:.45; }
    50%{ opacity:1; }
}

.window-title{
    flex:1;
    font-family:'JetBrains Mono',monospace;
    font-size:.74rem;
    color:var(--ink-dim);
    letter-spacing:.02em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.window-close{
    width:22px;
    height:22px;
    border:none;
    border-radius:7px;
    background:transparent;
    color:var(--ink-dim);
    font-size:.95rem;
    line-height:1;
    cursor:pointer;
    transition:background .15s, color .15s;
}

.window-close:hover{
    background:rgba(255,90,90,.18);
    color:#ff8a8a;
}

.window-close:focus-visible,
.desktop-app:focus-visible,
#terminal-send:focus-visible,
#terminal-input:focus-visible{
    outline:1px solid var(--accent);
    outline-offset:2px;
}


/* ---------- terminal ---------- */

#terminal-overlay{
    width:min(620px,94vw);
    height:min(70vh,520px);
}

.window-body{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
}

#terminal-output{
    flex:1;
    overflow-y:auto;
    padding:14px 16px;
    font-family:'JetBrains Mono',monospace;
    font-size:.86rem;
    line-height:1.6;
}

.term-line{
    white-space:pre-wrap;
}

.term-cmd{ color:var(--accent); }
.term-out{ color:var(--ink); }

#terminal-input-line{
    display:flex;
    gap:10px;
    align-items:center;
    padding:10px 14px;
    border-top:1px solid var(--hairline);
    flex-shrink:0;
}

#terminal-input-line .prompt{
    color:var(--glow);
    font-family:'JetBrains Mono',monospace;
}

#terminal-input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--ink);
    caret-color:var(--glow);
    font-family:'JetBrains Mono',monospace;
    font-size:.86rem;
}

#terminal-input::placeholder{ color:var(--ink-dim); }

#terminal-send{
    background:rgba(143,168,200,.1);
    color:var(--accent);
    border:1px solid var(--hairline);
    border-radius:7px;
    padding:6px 13px;
    font-family:'JetBrains Mono',monospace;
    font-size:.78rem;
    cursor:pointer;
    transition:background .15s;
}

#terminal-send:hover{ background:rgba(143,168,200,.2); }


/* ---------- notes ---------- */

.notes-window{
    width:min(360px,90vw);
    max-height:70vh;
}

.notes-body{
    padding:22px 26px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.notes-body p{
    font-style:italic;
    font-size:.95rem;
    color:var(--ink-dim);
    letter-spacing:.02em;
}

.notes-body p:nth-child(odd){ color:var(--ink); }


/* ---------- chat ---------- */

.chat-window{
    width:min(400px,92vw);
    height:min(72vh,540px);
}

.chat-body{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
    padding:0;
}

.chat-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    border-bottom:1px solid var(--hairline);
    flex-shrink:0;
}

.chat-header img{
    width:36px;
    height:36px;
    border-radius:50%;
    object-fit:cover;
}

.chat-name{
    font-size:.85rem;
    color:var(--ink);
}

.chat-status{
    font-size:.7rem;
    color:var(--glow);
}

.chat-thread{
    flex:1;
    overflow-y:auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:9px;
}

.bubble{
    max-width:75%;
    padding:9px 13px;
    border-radius:14px;
    font-size:.86rem;
    line-height:1.4;
    opacity:0;
}

.bubble-them{
    align-self:flex-end;
    background:rgba(143,168,200,.16);
    border:1px solid var(--hairline);
    border-bottom-right-radius:4px;
    color:var(--ink);
}

.bubble-me{
    align-self:flex-start;
    background:rgba(169,140,230,.18);
    border:1px solid rgba(169,140,230,.3);
    border-bottom-left-radius:4px;
    color:var(--ink);
}

</style>
</head>

<body>

<div class="pc-main">

    <img class="wallpaper" src="./img/wallpaper.png" alt="">
    <div class="vignette"></div>

    <div class="desktop-icons">

        <div class="desktop-app" id="open-terminal" tabindex="0">
            <img src="./img/cat1.jpg" alt="">
            <span>Terminal</span>
        </div>

        <div class="desktop-app" id="open-notes" tabindex="0">
            <img src="./img/cat1.jpg" alt="">
            <span>Notes</span>
        </div>

        <div class="desktop-app" id="open-chat" tabindex="0">
            <img src="./img/cat1.jpg" alt="">
            <span>Chat</span>
        </div>

    </div>

    <div class="taskbar">
        <div class="taskbar-left" id="taskbar-label"><b>dreamOS</b></div>
        <div class="taskbar-right"><span id="clock"></span></div>
    </div>

</div>


<div class="window" id="terminal-overlay">
    <div class="window-titlebar" data-drag>
        <span class="window-dot"></span>
        <span class="window-title">guest@dream — terminal</span>
        <button class="window-close" id="terminal-close">×</button>
    </div>
    <div class="window-body">
        <div id="terminal-output"></div>
        <div id="terminal-input-line">
            <span class="prompt">&gt;</span>
            <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" placeholder="type 'help' to begin">
            <button id="terminal-send">run</button>
        </div>
    </div>
</div>


<div class="window notes-window" id="notes-overlay">
    <div class="window-titlebar" data-drag>
        <span class="window-dot"></span>
        <span class="window-title">notes.txt</span>
        <button class="window-close" id="notes-close">×</button>
    </div>
    <div class="window-body notes-body">
        <p>- Life</p>
        <p>- Life</p>
        <p>- Life</p>
        <p>- Life</p>
        <p>- Life</p>
        <p>- Life</p>
    </div>
</div>


<div class="window chat-window" id="chat-overlay">
    <div class="window-titlebar" data-drag>
        <span class="window-dot"></span>
        <span class="window-title">chat — SidiMyOnlyFriends</span>
        <button class="window-close" id="chat-close">×</button>
    </div>
    <div class="window-body chat-body">
        <div class="chat-header">
            <img src="./img/cat1.jpg" alt="">
            <div>
                <p class="chat-name">SidiMyOnlyFriends</p>
                <p class="chat-status">online</p>
            </div>
        </div>
        <div class="chat-thread">
            <div class="bubble bubble-them">How r u?</div>
            <div class="bubble bubble-them">Im so lonely rn</div>
            <div class="bubble bubble-me">Keep it up G!</div>
        </div>
    </div>
</div>


<script>

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- generic window manager ---------- */

let zTop = 50;

function bringToFront(el){
    el.style.zIndex = ++zTop;
}

function setActiveApp(name){
    const label = document.getElementById('taskbar-label');
    label.innerHTML = name ? `<b>dreamOS</b> · ${name}` : '<b>dreamOS</b>';
}

function anyWindowOpen(){
    return [...document.querySelectorAll('.window')].some(w => w.style.display === 'flex');
}

function openWindow(el, appName){
    bringToFront(el);
    el.style.display = 'flex';

    if(!el.dataset.dragged){
        const r = el.getBoundingClientRect();
        el.style.left = Math.round((innerWidth - r.width) / 2) + 'px';
        el.style.top  = Math.max(24, Math.round((innerHeight - r.height) / 2 - 16)) + 'px';
    }

    setActiveApp(appName);

    if(!reduceMotion){
        el.animate([
            { opacity:0, filter:'blur(6px)', transform:'translateY(10px) scale(.97)' },
            { opacity:1, filter:'blur(0px)', transform:'translateY(0) scale(1)' }
        ], { duration:260, easing:'cubic-bezier(.16,.8,.24,1)' });
    }
}

function closeWindow(el, after){
    const finish = () => {
        el.style.display = 'none';
        if(!anyWindowOpen()) setActiveApp(null);
        after && after();
    };

    if(reduceMotion){ finish(); return; }

    const anim = el.animate([
        { opacity:1, filter:'blur(0px)', transform:'translateY(0) scale(1)' },
        { opacity:0, filter:'blur(4px)', transform:'translateY(8px) scale(.97)' }
    ], { duration:170, easing:'ease-in' });

    anim.onfinish = finish;
}

function makeDraggable(win, handle){
    let dragging = false, startX, startY, originLeft, originTop;

    handle.addEventListener('pointerdown', (e) => {
        if(e.target.closest('.window-close')) return;
        bringToFront(win);
        dragging = true;
        const rect = win.getBoundingClientRect();
        originLeft = rect.left;
        originTop = rect.top;
        startX = e.clientX;
        startY = e.clientY;
        handle.setPointerCapture(e.pointerId);
    });

    handle.addEventListener('pointermove', (e) => {
        if(!dragging) return;
        win.dataset.dragged = 'true';
        win.style.left = (originLeft + e.clientX - startX) + 'px';
        win.style.top  = (originTop  + e.clientY - startY) + 'px';
    });

    handle.addEventListener('pointerup', () => { dragging = false; });

    win.addEventListener('pointerdown', () => bringToFront(win));
}

document.querySelectorAll('.window').forEach(win => {
    makeDraggable(win, win.querySelector('[data-drag]'));
});

document.addEventListener('keydown', (e) => {
    if(e.key !== 'Escape') return;
    const open = [...document.querySelectorAll('.window')].filter(w => w.style.display === 'flex');
    if(!open.length) return;
    const top = open.reduce((a, b) => (+b.style.zIndex || 0) > (+a.style.zIndex || 0) ? b : a);
    top.querySelector('.window-close').click();
});


/* ---------- terminal ---------- */

const terminalOverlay = document.getElementById("terminal-overlay");
const terminalOutput  = document.getElementById("terminal-output");
const terminalInput   = document.getElementById("terminal-input");

const terminalFiles = {
    "note.txt": "sunyi.",
    "access.log": "[02:14] sunyi\n[02:41] hening.",
    "dream.txt": "you are not supposed to be here."
};

const commands = {

    help: () => `
help       show commands
ls         list files
cat file   read file
whoami     current user
clear      clear terminal
exit       close terminal
`,

    ls: () => Object.keys(terminalFiles).join("    "),

    whoami: () => "guest@dream",

    clear: () => {
        terminalOutput.innerHTML = "";
        return null;
    },

    exit: () => {
        closeTerminal();
        return null;
    }
};

function print(text, type = 'out'){
    if(text === null || text === undefined) return;
    const div = document.createElement("div");
    div.className = `term-line term-${type}`;
    div.textContent = text;
    terminalOutput.appendChild(div);
    terminalOutput.scrollTop = terminalOutput.scrollHeight;
    if(!reduceMotion){
        div.animate([{ opacity:0, transform:'translateY(2px)' }, { opacity:1, transform:'translateY(0)' }],
                     { duration:140, easing:'ease-out' });
    }
}

function runCommand(raw){

    const input = raw.trim();

    print(`> ${input}`, 'cmd');

    let result;

    if(input.startsWith("cat ")){

        const file = input.slice(4).trim();

        result =
            terminalFiles[file] ||
            `cat: ${file}: No such file`;

    }
    else if(commands[input]){

        result = commands[input]();

    }
    else if(input === ""){

        result = null;

    }
    else{

        result = `command not found: ${input}`;

    }

    if(result){
        print(result, 'out');
    }
}

function submitInput(){
    const value = terminalInput.value;
    if(!value.trim()) return;
    runCommand(value);
    terminalInput.value = "";
}

function openTerminal(){
    openWindow(terminalOverlay, 'Terminal');
    if(terminalOutput.childElementCount === 0){
        print("connected...", 'out');
        print("type 'help' for command list.", 'out');
    }
    terminalInput.focus();
}

function closeTerminal(){
    closeWindow(terminalOverlay);
}

document.getElementById("open-terminal").addEventListener("click", openTerminal);
document.getElementById("terminal-close").addEventListener("click", closeTerminal);
document.getElementById("terminal-send").addEventListener("click", submitInput);

terminalInput.addEventListener("keydown", (e) => {
    if(e.key === "Enter") submitInput();
});


/* ---------- notes ---------- */

const notesOverlay = document.getElementById('notes-overlay');

function openNotes(){ openWindow(notesOverlay, 'Notes'); }
function closeNotes(){ closeWindow(notesOverlay); }

document.getElementById('open-notes').addEventListener("click", openNotes);
document.getElementById('notes-close').addEventListener("click", closeNotes);


/* ---------- chat ---------- */

const chatOverlay = document.getElementById('chat-overlay');

function openChat(){
    openWindow(chatOverlay, 'Chat');
    if(!reduceMotion){
        document.querySelectorAll('.bubble').forEach((b, i) => {
            b.animate([
                { opacity:0, transform:'translateY(6px) scale(.96)' },
                { opacity:1, transform:'translateY(0) scale(1)' }
            ], { duration:240, delay:150 + i * 90, easing:'cubic-bezier(.16,.8,.24,1)', fill:'both' });
        });
    } else {
        document.querySelectorAll('.bubble').forEach(b => b.style.opacity = 1);
    }
}

function closeChat(){ closeWindow(chatOverlay); }

document.getElementById('open-chat').addEventListener("click", openChat);
document.getElementById('chat-close').addEventListener("click", closeChat);


/* ---------- desktop entrance + clock ---------- */

document.querySelectorAll('.desktop-app').forEach((icon, i) => {
    if(reduceMotion){
        icon.style.opacity = 1;
        return;
    }
    icon.animate([
        { opacity:0, transform:'translateY(14px)' },
        { opacity:1, transform:'translateY(0)' }
    ], { duration:420, delay:150 + i * 110, easing:'cubic-bezier(.16,.8,.24,1)', fill:'both' });
});

function updateClock(){
    const now = new Date();
    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    document.getElementById("clock").innerText = `${h}:${m}`;
}

updateClock();
setInterval(updateClock, 1000);

</script>

</body>
</html>
