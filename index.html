<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreams</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="vignette"></div>

    <div id="joystick-base">
        <div id="joystick-knob"></div>
    </div>
    <div id="interact-message"></div>

    <div id="chatbox-container">
        <div id="chatbox-avatar">
            <img id="chatbox-img" src="texture/tanah.png" alt="Avatar">
        </div>
        <div id="chatbox-content">
            <div id="chatbox-name">Char name</div>
            <div id="chatbox-text">Dialog</div>
            <div id="chatbox-hint">Close chat</div>
        </div>
    </div>

    <div id="interact-button">E</div>
    <div id="terminal-overlay">
    <div id="terminal-header">
        <span>laptop@dream</span>
        <span id="terminal-close">[esc / type exit]</span>
    </div>
    <div id="terminal-output"></div>
    <div id="terminal-input-line">
        <span class="terminal-prompt">&gt;</span>
        <input id="terminal-input" type="text" autocomplete="off" autocapitalize="off" />
    </div>
    </div>


    <audio id="bg-music" src="music/ambient.mp3" loop></audio>

    <div id="loading-screen">
        <div id="loading-content">
            <div class="loading-text" id="loading-status">Loading...</div>
            <button id="start-btn" style="display: none; margin-top: 20px; padding: 10px 20px; background: #8fa8c8; border: none; cursor: pointer; font-family: monospace;">Start</button>
        </div>
    </div>



<script type="importmap">
    {
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@v0.149.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.149.0/examples/jsm/"
    }
    }
</script>
    
<script type="module" src="app.js"></script>
</body>
</html>
