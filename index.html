<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreams</title>
     <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; z-index: 1;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7) 100%);
        }

        #joystick-base {
            position: fixed;
            width: 90px; 
            height: 90px; 
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            touch-action: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.2s;

        }

        #joystick-knob {
            position: absolute; 
            top: 50%; 
            left: 50%;
            width: 40px;  
            height: 40px; 
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: translate(-50%, -50%);
        }
      
        @media (hover: hover) and (pointer: fine) {
            #joystick-base { display: none; }
        }


        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #05060c;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease-out;
        }

        .loading-text {
            color: #8fa8c8;
            font-family: monospace; 
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        #interact-message {
            position: fixed;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #e8e4d8;
            font-family: monospace;
            font-size: 1rem;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 6;
            text-align: center;
        }

 
        
        #chatbox-container {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 600px;
            background: rgba(5, 6, 12, 0.9);
            border: 2px solid #8fa8c8;
            border-radius: 8px;
            display: none;
            padding: 15px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        #chatbox-avatar {
            width: 80px;
            height: 80px;
            margin-right: 15px;
            flex-shrink: 0;
            background: #1a2440; 
            border: 1px solid #8fa8c8;
            border-radius: 4px;
            overflow: hidden;
        }

        #chatbox-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #chatbox-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            position: relative;
        }

        #chatbox-name {
            color: #ffaa55; 
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        #chatbox-text {
            color: #e8e4d8;
            font-family: monospace;
            font-size: 1rem;
            line-height: 1.5;
        }

        #chatbox-hint {
            position: absolute;
            bottom: -5px;
            right: 0;
            color: #8fa8c8;
            font-family: monospace;
            font-size: 0.7rem;
            animation: pulse 2s infinite;
        }
     </style>
</head>
<body>

    <div id="vignette"></div>

    <div id="joystick-base">
        <div id="joystick-knob"></div>
    </div>
    <div id="interact-message"></div>

    <div id="chatbox-container">
        <div id="chatbox-avatar">
            <img id="chatbox-img" src="texture/tanah.png" alt="Avatar">
        </div>
        <div id="chatbox-content">
            <div id="chatbox-name">Char name</div>
            <div id="chatbox-text">Dialog</div>
            <div id="chatbox-hint">Close chat</div>
        </div>
    </div>


    <audio id="bg-music" src="music/ambient.mp3" loop></audio>

    <div id="loading-screen">
        <div id="loading-content">
            <div class="loading-text" id="loading-status">Loading...</div>
            <button id="start-btn" style="display: none; margin-top: 20px; padding: 10px 20px; background: #8fa8c8; border: none; cursor: pointer; font-family: monospace;">Start</button>
        </div>
    </div>



<script type="importmap">
    {
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@v0.149.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.149.0/examples/jsm/"
    }
    }
</script>
    
<script type="module" src="app.js"></script>
</body>
</html>
