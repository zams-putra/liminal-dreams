<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreams</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="vignette"></div>

    <div id="joystick-base">
        <div id="joystick-knob"></div>
    </div>
    <div id="interact-message"></div>

    <div id="chatbox-container">
        <div id="chatbox-avatar">
            <img id="chatbox-img" src="texture/tanah.png" alt="Avatar">
        </div>
        <div id="chatbox-content">
            <div id="chatbox-name">Char name</div>
            <div id="chatbox-text">Dialog</div>
            <div id="chatbox-hint">Close chat</div>
        </div>
    </div>

    <div id="interact-button">E</div>


    </div>


    <audio id="bg-music" src="music/ambient.mp3" loop></audio>

    <div id="loading-screen">
        <div id="loading-content">
            <div class="loading-text" id="loading-status">Loading...</div>
            <button id="start-btn" style="display: none; margin-top: 20px; padding: 10px 20px; background: #8fa8c8; border: none; cursor: pointer; font-family: monospace;">Start</button>
        </div>
    </div>


    <!-- pc disini ngab -->

    
    <div class="pc-main">

        <img class="wallpaper" src="./img/wallpaper.png" alt="">
        <div class="vignette"></div>

        <div class="desktop-icons">

            <div class="desktop-app" id="open-terminal" tabindex="0">
                <img src="./img/cat1.jpg" alt="">
                <span>Terminal</span>
            </div>

            <div class="desktop-app" id="open-notes" tabindex="0">
                <img src="./img/cat1.jpg" alt="">
                <span>Notes</span>
            </div>

            <div class="desktop-app" id="open-chat" tabindex="0">
                <img src="./img/cat1.jpg" alt="">
                <span>Chat</span>
            </div>

        </div>

        <div class="taskbar">
            <button id="pc-back-btn">Sleep</button>
            <div class="taskbar-left" id="taskbar-label"><b>dreamOS</b></div>
            <div class="taskbar-right"><span id="clock"></span></div>
        </div>

    </div>


    <div class="window" id="terminal-overlay">
        <div class="window-titlebar" data-drag>
            <span class="window-dot"></span>
            <span class="window-title">guest@dream — terminal</span>
            <button class="window-close" id="terminal-close">×</button>
        </div>
        <div class="window-body">
            <div id="terminal-output"></div>
            <div id="terminal-input-line">
                <span class="prompt">&gt;</span>
                <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" placeholder="type 'help' to begin">
                <button id="terminal-send">run</button>
            </div>
        </div>
    </div>


    <div class="window notes-window" id="notes-overlay">
        <div class="window-titlebar" data-drag>
            <span class="window-dot"></span>
            <span class="window-title">notes.txt</span>
            <button class="window-close" id="notes-close">×</button>
        </div>
        <div class="window-body notes-body">
            <p>- Life</p>
            <p>- Life</p>
            <p>- Life</p>
            <p>- Life</p>
            <p>- Life</p>
            <p>- Life</p>
        </div>
    </div>


    <div class="window chat-window" id="chat-overlay">
        <div class="window-titlebar" data-drag>
            <span class="window-dot"></span>
            <span class="window-title">chat — SidiMyOnlyFriends</span>
            <button class="window-close" id="chat-close">×</button>
        </div>
        <div class="window-body chat-body">
            <div class="chat-header">
                <img src="./img/cat1.jpg" alt="">
                <div>
                    <p class="chat-name">SidiMyOnlyFriends</p>
                    <p class="chat-status">online</p>
                </div>
            </div>
            <div class="chat-thread">
                <div class="bubble bubble-them">How r u?</div>
                <div class="bubble bubble-them">Im so lonely rn</div>
                <div class="bubble bubble-me">Keep it up G!</div>
            </div>
        </div>


<script type="importmap">
    {
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@v0.149.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.149.0/examples/jsm/"
    }
    }
</script>
    
<script type="module" src="app.js"></script>
</body>
</html>
